<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLT Word Cards | Speech &amp; Language Therapy Flashcard Tool</title>
    <meta name="description" content="Free tool for speech and language therapists to search and print word cards by initial sound, final sound, and word structure (e.g. CVC). Filter by phoneme and print custom flashcard sets instantly.">
    <meta name="keywords" content="SLT word cards, speech and language therapy, flashcards, phoneme cards, CVC words, articulation therapy, word initial sounds, word final sounds, printable word cards">

    <!-- Canonical -->
    <link rel="canonical" href="https://speakeasy-slt.uk/">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://speakeasy-slt.uk/">
    <meta property="og:title" content="SLT Word Cards | Speech &amp; Language Therapy Flashcard Tool">
    <meta property="og:description" content="Search and print speech and language therapy word cards by initial sound, final sound, and word structure. Free tool for SLTs and therapists.">
    <meta property="og:site_name" content="SLT Word Cards">
    <meta property="og:locale" content="en_GB">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="SLT Word Cards | Speech &amp; Language Therapy Flashcard Tool">
    <meta name="twitter:description" content="Search and print speech and language therapy word cards by initial sound, final sound, and word structure. Free tool for SLTs and therapists.">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "SLT Word Cards",
      "url": "https://speakeasy-slt.uk",
      "description": "Search and print speech and language therapy word cards by initial sound, final sound, and word structure.",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "Web Browser",
      "isAccessibleForFree": true,
      "audience": {
        "@type": "Audience",
        "audienceType": "Speech and Language Therapists"
      }
    }
    </script>

    <!-- Favicon -->
    <link rel="icon" href="logo.svg" type="image/svg+xml">

    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="no-print-area" class="app-container">
        <header class="app-header">
            <h1>SLT Word Cards</h1>
            <p>Search and print your speech and language therapy cards.</p>
        </header>

        <div style="background:linear-gradient(135deg,rgba(99,102,241,0.12),rgba(139,92,246,0.12));border:1px solid rgba(99,102,241,0.3);border-radius:12px;padding:0.9rem 1.2rem;text-align:center;font-size:0.95rem;color:#475569;line-height:1.5;">
            🚧 <strong style="color:#4f46e5;">Early development:</strong> this tool currently has a limited word set. Help us grow it by using the <strong>Request a Card</strong> button to submit words and structures.
        </div>

        <main class="main-content">
            <!-- Search Section -->
            <section class="glass-panel" id="search-section">
                <h2>Search Criteria</h2>
                <div class="input-group">
                    <label for="initialSound">Word Initial Sound</label>
                    <input type="text" id="initialSound" placeholder="e.g., k">
                </div>
                <div class="input-group">
                    <label for="finalSound">Word Final Sound</label>
                    <input type="text" id="finalSound" placeholder="e.g., t">
                </div>
                <div class="input-group">
                    <label for="structure">Structure (e.g., cvc)</label>
                    <input type="text" id="structure" placeholder="e.g., cvc">
                </div>

                <div class="button-row">
                    <button id="searchBtn" class="primary-btn pulse-on-hover">Search Cards</button>
                    <button id="infoBtn" class="secondary-btn">Request a Card</button>
                </div>
            </section>

            <!-- Results Section -->
            <section class="glass-panel" id="results-section">
                <div class="results-header">
                    <h2>Matching Words</h2>
                    <span id="statusLabel" class="status-badge">Ready to search</span>
                </div>

                <div class="list-controls">
                    <label class="custom-checkbox select-all-btn">
                        <input type="checkbox" id="selectAllCheckbox">
                        <span class="checkmark"></span>
                        Select All
                    </label>
                </div>

                <div id="resultsList" class="results-container">
                    <!-- Checkboxes will be injected here via JS -->
                </div>

                <div class="print-controls">
                    <div class="input-group row-align">
                        <label for="instanceCount">Instance Count:</label>
                        <input type="number" id="instanceCount" value="1" min="1" max="10">
                    </div>
                    <button id="printBtn" class="primary-btn bounce-on-hover">Create List & Print</button>
                </div>
            </section>
        </main>

        <footer style="text-align: center; color: var(--text-secondary); font-size: 0.9rem; padding-top: 1rem;">
            made with love
        </footer>
    </div>

    <!-- Print Area -->
    <div id="print-area">
        <div id="printGrid" class="print-grid">
            <!-- Images will be injected here via JS for printing -->
        </div>
    </div>

    <!-- Scripts -->
    <!-- PapaParse for parsing the CSV file locally -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
